<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9to5 University Resume Builder</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  nav { background:#333; color:#fff; padding:10px; display:flex; gap:10px; }
  nav a { color:#fff; text-decoration:none; cursor:pointer; }
  nav a.active { font-weight:bold; text-decoration:underline; }
  .page-section { display:none; padding:20px; }
  .page-section.active-page { display:block; }
  input, textarea, select, button { display:block; margin:10px 0; padding:8px; width:100%; max-width:400px; }
  #cvPreview { border:1px solid #ccc; padding:20px; margin-top:20px; }
</style>
</head>
<body>

<nav>
  <a data-page="resume" class="nav-link active">Resume Builder</a>
  <a data-page="profile" class="nav-link">Profile</a>
</nav>

<!-- ==================== RESUME PAGE ==================== -->
<section id="resume-page" class="page-section active-page">
  <h1>Create Your Resume</h1>
  
  <input id="firstName" placeholder="First Name">
  <input id="lastName" placeholder="Last Name">
  <input id="jobTitle" placeholder="Job Title">
  <input id="phone" placeholder="Phone">
  <input id="email" placeholder="Email">
  <input id="address" placeholder="Address">
  <textarea id="summary" placeholder="Professional Summary"></textarea>
  <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
  <textarea id="languages" placeholder="Languages (comma separated)"></textarea>
  <textarea id="experience" placeholder="Experience (position|company|location|start|end|description)"></textarea>
  <textarea id="education" placeholder="Education (institution|degree|start|end)"></textarea>
  <textarea id="awards" placeholder="Awards (title|description|year)"></textarea>
  <textarea id="references" placeholder="References (name|company|phone|email)"></textarea>
  
  <label>Upload Photo</label>
  <input type="file" class="photoUpload">
  
  <label>Template</label>
  <select id="templateSelect">
    <option value="default">Default</option>
  </select>
  
  <button data-action="saveResume">Save Resume</button>
  <button data-action="downloadPDF">Download PDF</button>
  
  <div id="cvPreview"></div>
</section>

<!-- ==================== PROFILE PAGE ==================== -->
<section id="profile-page" class="page-section">
  <div id="profileContainer">
    <!-- Dynamic login/signup or saved resumes will load here -->
  </div>
</section>

<!-- ==================== DEPENDENCIES ==================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- ==================== CUSTOM JS ==================== -->
<script src="app.js"></script>

</body>
</html>
