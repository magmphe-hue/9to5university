<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>9to5 University · Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Montserrat', sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
    .profile-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .auth-form input, .auth-form button { display: block; width: 100%; margin-bottom: 1rem; padding: 0.75rem; border-radius: 12px; border: 1px solid #cbd5e1; }
    .btn-primary { background: #00a2ad; color: white; border: none; padding: 0.75rem; border-radius: 40px; cursor: pointer; }
    .saved-resume-item { background: #f8fafc; padding: 1rem; margin-bottom: 0.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    button { cursor: pointer; }
  </style>
</head>
<body>
<div class="profile-container" id="profileContainer">Loading...</div>
<script>
  const SUPABASE_URL = 'https://pfqpyzfqwsksepoohive.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmcXB5emZxd3Nrc2Vwb29oaXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzM1MTMsImV4cCI6MjA4OTk0OTUxM30.NPbcOFUPS_2zYg-2MjH1ukHrHqN8AjXRDrP1OpU4nNs';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadProfile() {
    const container = document.getElementById('profileContainer');
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      container.innerHTML = `
        <h2>Sign In / Sign Up</h2>
        <div class="auth-form">
          <input type="email" id="email" placeholder="Email">
          <input type="password" id="password" placeholder="Password">
          <button id="loginBtn" class="btn-primary">Sign In</button>
          <button id="signupBtn" class="btn-primary" style="background:#6c757d;">Sign Up</button>
        </div>
      `;
      document.getElementById('loginBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
        alert(error ? error.message : 'Logged in!');
        if (!error) loadProfile();
      });
      document.getElementById('signupBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password: pwd });
        alert(error ? error.message : 'Account created! You can now sign in.');
      });
      return;
    }
    const { data: resumes } = await supabase.from('resumes').select('*').eq('user_id', user.id);
    container.innerHTML = `
      <h2>Welcome, ${user.email}</h2>
      <p>Account created: ${new Date(user.created_at).toLocaleDateString()}</p>
      <p>Saved resumes: ${resumes?.length || 0}</p>
      <button id="logoutBtn" style="background:#dc3545; color:white; border:none; padding:0.5rem 1rem; border-radius:40px;">Sign Out</button>
      <hr><h3>Your Resumes</h3>
      <div id="resumeList">${(resumes || []).map(r => `
        <div class="saved-resume-item">
          <span><strong>${r.first_name} ${r.last_name}</strong> – ${r.job_title}</span>
          <div>
            <button class="loadBtn" data-id="${r.id}">Load</button>
            <button class="deleteBtn" data-id="${r.id}" style="background:#dc3545; color:white;">Delete</button>
          </div>
        </div>
      `).join('') || '<p>No resumes saved.</p>'}</div>
    `;
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); loadProfile(); });
    document.querySelectorAll('.loadBtn').forEach(btn => btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      const resume = resumes.find(r => r.id === id);
      if (resume) {
        localStorage.setItem('resumeToLoad', JSON.stringify(resume));
        window.location.href = 'resume.html';
      }
    }));
    document.querySelectorAll('.deleteBtn').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-id');
      if (confirm('Delete?')) await supabase.from('resumes').delete().eq('id', id);
      loadProfile();
    }));
  }
  loadProfile();
</script>
</body>
</html>
