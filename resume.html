<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9to5 University · Resume Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Copy all styles from index.html plus resume-specific */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f1f5f9; }
    .top-bar, .main-header, .nav-bar, .footer { /* same as index */ }
    .resume-builder-wrapper { padding: 2rem 5%; }
    .resume-builder-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; }
    .builder-form-panel, .builder-preview-panel { background: white; border-radius: 24px; padding: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    .form-section { margin-bottom: 2rem; background: #f8fafc; padding: 1rem; border-radius: 16px; }
    .form-group { margin-bottom: 1rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.6rem; border-radius: 12px; border: 1px solid #cbd5e1; }
    .cv-preview { background: white; border-radius: 12px; overflow: auto; max-height: 70vh; padding: 1rem; }
    .preview-actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .btn-primary, .btn-secondary { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; }
    .btn-primary { background: #00a2ad; color: white; }
    .btn-secondary { background: #e2e8f0; }
    @media (max-width: 1024px) { .resume-builder-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="top-bar"><a href="index.html" class="signin-icon"><i class="fas fa-user"></i></a></div>
<div class="main-header"><a href="index.html"><img src="https://i.postimg.cc/8Chj1H8D/file-00000000d4b4722f8dcbec10fa906d0a.png" alt="Logo" style="max-height:80px"></a></div>
<div class="nav-bar"><div class="nav-menu"><a href="resume.html">RESUME BUILDER</a><a href="rights.html">WORKERS' RIGHTS</a><a href="issues.html">REPORT MISCONDUCT</a><a href="contact.html">CONTACT</a></div></div>

<div class="resume-builder-wrapper">
  <div class="resume-builder-container">
    <div class="builder-form-panel">
      <h2>Build Your Resume</h2>
      <div class="form-section"><h3>Personal Details</h3>
        <div class="form-group"><label>First Name</label><input id="firstName" value="Lorna"></div>
        <div class="form-group"><label>Last Name</label><input id="lastName" value="Alvarado"></div>
        <div class="form-group"><label>Job Title</label><input id="jobTitle" value="Marketing Manager"></div>
        <div class="form-group"><label>Phone</label><input id="phone" value="123-456-7890"></div>
        <div class="form-group"><label>Email</label><input id="email" value="hello@email.com"></div>
        <div class="form-group"><label>Address</label><input id="address" value="123 Street, City"></div>
      </div>
      <div class="form-section"><h3>Summary</h3><textarea id="summary" rows="3">Marketing manager with 8+ years of experience in digital strategy...</textarea></div>
      <div class="form-section"><h3>Experience</h3><textarea id="experience" rows="4">Product Design Manager|Arowwai Industries|Any City|2020|2023|Led design strategy for 10+ products...</textarea></div>
      <div class="form-section"><h3>Education</h3><textarea id="education" rows="2">Borcelle University|Bachelor of Business Management|2016|2020</textarea></div>
      <div class="form-section"><h3>Skills</h3><input id="skills" value="Organized, Creativity, Teamwork"></div>
      <div class="form-section"><h3>Languages</h3><input id="languages" value="English, Spanish"></div>
      <div class="form-section"><h3>Awards</h3><textarea id="awards" rows="2">Best Designer Award|Excellence in design|2016</textarea></div>
      <div class="form-section"><h3>References</h3><textarea id="references" rows="2">John Doe|ABC Corp|+123456|john@email.com</textarea></div>
    </div>
    <div class="builder-preview-panel">
      <div id="cvPreview" class="cv-preview"></div>
      <div class="preview-actions">
        <button id="downloadPdfBtn" class="btn-primary"><i class="fas fa-download"></i> Download PDF</button>
        <button id="saveResumeBtn" class="btn-secondary"><i class="fas fa-save"></i> Save to Profile</button>
      </div>
    </div>
  </div>
</div>
<footer class="footer"><p>© 2025 9to5 University</p></footer>
<button id="backToTop" class="back-to-top"><i class="fas fa-arrow-up"></i></button>

<script>
  const SUPABASE_URL = 'https://pfqpyzfqwsksepoohive.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmcXB5emZxd3Nrc2Vwb29oaXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzM1MTMsImV4cCI6MjA4OTk0OTUxM30.NPbcOFUPS_2zYg-2MjH1ukHrHqN8AjXRDrP1OpU4nNs';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM elements
  const firstName = document.getElementById('firstName');
  const lastName = document.getElementById('lastName');
  const jobTitle = document.getElementById('jobTitle');
  const phone = document.getElementById('phone');
  const email = document.getElementById('email');
  const address = document.getElementById('address');
  const summary = document.getElementById('summary');
  const experience = document.getElementById('experience');
  const education = document.getElementById('education');
  const skills = document.getElementById('skills');
  const languages = document.getElementById('languages');
  const awards = document.getElementById('awards');
  const references = document.getElementById('references');
  const cvPreview = document.getElementById('cvPreview');
  const downloadBtn = document.getElementById('downloadPdfBtn');
  const saveBtn = document.getElementById('saveResumeBtn');

  function parsePipe(text) { return text.split('\n').filter(l=>l.trim()).map(l=>l.split('|').map(p=>p.trim())); }
  function getArray(field) { return field.value.split(',').map(s=>s.trim()).filter(s=>s); }

  function updatePreview() {
    const data = {
      firstName: firstName.value, lastName: lastName.value, jobTitle: jobTitle.value,
      phone: phone.value, email: email.value, address: address.value, summary: summary.value,
      experience: parsePipe(experience.value).map(p=>({position:p[0]||'',company:p[1]||'',location:p[2]||'',start:p[3]||'',end:p[4]||'',description:p[5]||''})),
      education: parsePipe(education.value).map(p=>({institution:p[0]||'',degree:p[1]||'',start:p[2]||'',end:p[3]||''})),
      skills: getArray(skills), languages: getArray(languages),
      awards: parsePipe(awards.value).map(p=>({title:p[0]||'',description:p[1]||'',year:p[2]||''})),
      references: parsePipe(references.value).map(p=>({name:p[0]||'',company:p[1]||'',phone:p[2]||'',email:p[3]||''}))
    };
    cvPreview.innerHTML = `
      <div style="font-family:Montserrat; max-width:210mm; margin:0 auto; padding:1rem;">
        <h1 style="color:#014656;">${data.firstName} ${data.lastName}</h1>
        <p style="color:#00a2ad;">${data.jobTitle}</p>
        <div style="background:#f0f9fa; padding:0.5rem; border-radius:8px;">${data.phone} | ${data.email} | ${data.address}</div>
        <h2>Summary</h2><p>${data.summary}</p>
        <h2>Experience</h2>${data.experience.map(e=>`<div><strong>${e.position}</strong> at ${e.company} (${e.start}-${e.end})<br>${e.description}</div>`).join('')}
        <h2>Education</h2>${data.education.map(e=>`<div>${e.degree} - ${e.institution} (${e.start}-${e.end})</div>`).join('')}
        <h2>Skills</h2><ul>${data.skills.map(s=>`<li>${s}</li>`).join('')}</ul>
        <h2>Languages</h2><ul>${data.languages.map(l=>`<li>${l}</li>`).join('')}</ul>
        ${data.awards.length?`<h2>Awards</h2><ul>${data.awards.map(a=>`<li>${a.title} (${a.year}) - ${a.description}</li>`).join('')}</ul>`:''}
        ${data.references.length?`<h2>References</h2><ul>${data.references.map(r=>`<li>${r.name}, ${r.company}<br>${r.phone} | ${r.email}</li>`).join('')}</ul>`:''}
      </div>`;
  }

  async function downloadPDF() {
    const element = cvPreview;
    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#fff' });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgWidth = 210;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
    pdf.save('resume.pdf');
  }

  async function saveResume() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return alert('Please sign in on Profile page.');
    const resumeData = {
      user_id: user.id, first_name: firstName.value, last_name: lastName.value, job_title: jobTitle.value,
      phone: phone.value, email: email.value, address: address.value, summary: summary.value,
      experience: experience.value, education: education.value, skills: skills.value,
      languages: languages.value, awards: awards.value, references: references.value
    };
    const { error } = await supabase.from('resumes').insert([resumeData]);
    alert(error ? error.message : 'Saved!');
  }

  [firstName, lastName, jobTitle, phone, email, address, summary, experience, education, skills, languages, awards, references].forEach(field => field?.addEventListener('input', updatePreview));
  downloadBtn?.addEventListener('click', downloadPDF);
  saveBtn?.addEventListener('click', saveResume);
  updatePreview();

  // Back to top
  const backBtn = document.createElement('button'); backBtn.innerHTML = '↑'; backBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#00a2ad;color:white;border:none;border-radius:50%;width:45px;height:45px;cursor:pointer;display:none;z-index:1000;';
  document.body.appendChild(backBtn);
  window.addEventListener('scroll', () => backBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
  backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
